<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Blogs</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        .blog-card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .blog-card h2 { margin: 0 0 8px 0; }
        .blog-card p { color: #555; }
        .actions { margin-top: 10px; display: flex; gap: 10px; }
        a button, button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-edit { background-color: #f0a500; color: white; }
        .btn-delete { background-color: #e53935; color: white; }
        .btn-create { background-color: #43a047; color: white; padding: 10px 20px; font-size: 15px; text-decoration: none; display: inline-block; border-radius: 4px; margin-bottom: 20px; }
    </style>
</head>
<body>
 
    <h1>All Blogs</h1>
    <a class="btn-create" href="/blogs/create">+ Create New Blog</a>
 
    {% for blog in blogs %}
    <div class="blog-card">
        <h2>{{ blog.title }}</h2>
        <p>{{ blog.content }}</p>
        <div class="actions">
            <a href="/blogs/update/{{ blog.id }}"><button class="btn-edit">Edit</button></a>
            <button class="btn-delete" onclick="deleteBlog({{ blog.id }})">Delete</button>
        </div>
    </div>
    {% else %}
    <p>No blogs yet. Create one!</p>
    {% endfor %}
 
    <script>
        async function deleteBlog(id) {
            if (!confirm("Are you sure you want to delete this blog?")) return;
 
            const res = await fetch(`/blogs/${id}`, {
                method: "DELETE"
            });
 
            if (res.ok) {
                window.location.href = "/blogs";
            } else {
                alert("Failed to delete blog.");
            }
        }
    </script>
 
</body>
</html>
